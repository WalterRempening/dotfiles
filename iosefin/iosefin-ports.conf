# Project port registry for iosefin sync
# Format: repo_relative_path:domain:app_port:slot
#
# Port allocation for worktrees:
#   app_port  = main_app_port + offset    (where offset = (slot*3 + wt_index) * 100)
#   all docker ports are offset by the same amount
#   e.g. hopninj (slot 0) WT1: offset=100, WT2: offset=200, WT3: offset=300
#        senova  (slot 1) WT1: offset=400, WT2: offset=500, WT3: offset=600
#
# app_port=0 means no web server (backend-only / library)

hopninj/skola-hopninj-app:hopninj:8081:0
senova/senova-pos:senova:8083:1
sbs/skola-api:sbs:8080:2
sbs/skola-ui:sbs-ui:3000:3
kassa/kassa-pos-web:kassa:8085:4
infra/faktura:faktura:0:5
infra/slant:slant:0:6
infra/snack:snack:0:7
menoserv/buakfieren-app:buakfieren:8082:8
